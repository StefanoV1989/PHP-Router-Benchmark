name: Verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ROUTER_BENCH_ALLOW_PHP_MISMATCH: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          ini-values: error_reporting=8191, opcache.enable=1, opcache.enable_cli=1, opcache.jit=0, opcache.jit_buffer_size=0
      - uses: ramsey/composer-install@v3
      - run: composer verify
      - name: Smoke benchmark (not an official performance result)
        run: composer benchmark:quick -- --skip-verify
      - name: Discard CI timings
        run: >-
          php -r 'foreach (glob("results/*") ?: [] as $file) {
          if (is_file($file) && basename($file) !== ".gitkeep") { unlink($file); }
          }'
